name: Build Android APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install python-for-android cython

    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          python3-pip build-essential git ffmpeg \
          libsdl2-dev libsdl2-image-dev libsdl2-mixer-dev libsdl2-ttf-dev \
          libportmidi-dev libswscale-dev libavformat-dev libavcodec-dev \
          zlib1g-dev libgstreamer1.0 gstreamer1.0-plugins-base gstreamer1.0-plugins-good \
          libsqlite3-dev libffi-dev libssl-dev autoconf automake libtool pkg-config \
          libncurses5-dev libreadline-dev tk-dev unzip zip wget openjdk-17-jdk

    - name: Setup Android SDK
      run: |
        export ANDROID_HOME=/usr/local/lib/android/sdk
        export ANDROID_SDK_ROOT=/usr/local/lib/android/sdk
        export JAVA_HOME=/usr/lib/jvm/java-17-openjdk-amd64
        export PATH=$JAVA_HOME/bin:$PATH
        yes | sdkmanager --licenses || true
        sdkmanager "platform-tools" "build-tools;33.0.0" "platforms;android-33" "ndk;25.2.9519653" || true

    - name: Build APK with p4a
      run: |
        export ANDROID_HOME=/usr/local/lib/android/sdk
        export ANDROID_SDK_ROOT=/usr/local/lib/android/sdk
        export JAVA_HOME=/usr/lib/jvm/java-17-openjdk-amd64
        export PATH=$JAVA_HOME/bin:$PATH
        
        mkdir -p bin
        
        python-for-android apk \
          --sdk-dir $ANDROID_HOME \
          --ndk-dir $ANDROID_HOME/ndk/25.2.9519653 \
          --android-api 33 \
          --ndk-api 21 \
          --bootstrap sdl2 \
          --requirements python3,kivy==2.3.1,pillow \
          --arch arm64-v8a \
          --name "一点天惊点名器" \
          --package org.yidiantianjing.rollcall \
          --version 6.0.0.0 \
          --orientation portrait \
          --icon icon.png \
          --permission INTERNET \
          --permission WRITE_EXTERNAL_STORAGE \
          --permission READ_EXTERNAL_STORAGE \
          --dist-name rollcall \
          --output bin/rollcall-6.0.0.0.apk \
          --debug || true
        
        # 检查生成的 APK
        ls -la bin/

    - name: Upload APK
      uses: actions/upload-artifact@v4
      if: success()
      with:
        name: android-apk
        path: bin/*.apk
        retention-days: 30

    - name: Upload build logs on failure
      uses: actions/upload-artifact@v4
      if: failure()
      with:
        name: build-logs
        path: ~/.local/share/python-for-android/**/*.log
        retention-days: 7
